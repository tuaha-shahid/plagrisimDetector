<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PlagiarismGuard AI</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png">
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6601858316539844"
     crossorigin="anonymous"></script>
  <!-- Schema 1: SoftwareApplication — signals this is a ranked tool -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PlagiarismGuard",
      "url": "https://plagiarism-checker.dev",
      "operatingSystem": "All",
      "applicationCategory": "EducationalApplication",
      "description": "Free AI-powered plagiarism checker and content originality scanner. Detect copied text, AI-generated content, and paraphrasing in seconds.",
      "featureList": ["AI Plagiarism Detection","ChatGPT Content Detection","Real-Time Similarity Scoring","Academic Integrity Verification"],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1240",
        "bestRating": "5"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "provider": {
        "@type": "Organization",
        "name": "PlagiarismGuard",
        "url": "https://plagiarism-checker.dev"
      }
    }
  </script>

  <!-- Schema 2: WebSite — enables Sitelinks Search Box & brand entity -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PlagiarismGuard",
      "alternateName": "Plagiarism Checker AI",
      "url": "https://plagiarism-checker.dev",
      "description": "Free AI plagiarism checker and content originality tool for students, researchers, and content creators.",
      "publisher": {
        "@type": "Organization",
        "name": "PlagiarismGuard",
        "url": "https://plagiarism-checker.dev",
        "logo": {
          "@type": "ImageObject",
          "url": "https://plagiarism-checker.dev/favicon.png"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://plagiarism-checker.dev/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <!-- Schema 3: SiteNavigationElement — tells Google exact site hierarchy for Sitelinks -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "PlagiarismGuard Site Navigation",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Home — Free Plagiarism Checker",
          "description": "Check any text for plagiarism and AI-generated content for free, instantly.",
          "url": "https://plagiarism-checker.dev/"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 2,
          "name": "Blog & Resources",
          "description": "Expert articles on AI plagiarism detection, academic integrity, and content originality.",
          "url": "https://plagiarism-checker.dev/blog"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,
          "name": "Pricing & Plans",
          "description": "Explore PlagiarismGuard's free and premium plans for individuals, students, and teams.",
          "url": "https://plagiarism-checker.dev/services"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 4,
          "name": "About Us",
          "description": "Learn about PlagiarismGuard's mission to protect content originality with AI technology.",
          "url": "https://plagiarism-checker.dev/about"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 5,
          "name": "Contact Us",
          "description": "Get in touch with the PlagiarismGuard team for support, partnerships, or feedback.",
          "url": "https://plagiarism-checker.dev/contact"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 6,
          "name": "Privacy Policy",
          "description": "Read PlagiarismGuard's data privacy policy and how your content is handled.",
          "url": "https://plagiarism-checker.dev/privacy"
        }
      ]
    }
  </script>

  <style>
    body { background-color: #0A0F1E; }
    app-root { opacity: 0; transition: opacity 0.3s; }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const root = document.querySelector('app-root');
      if (root) root.style.opacity = '1';
    });
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
