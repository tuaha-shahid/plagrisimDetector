<figure class="blog-image-figure">
  <img
    class="blog-image-img"
    [src]="imageSrc"
    [alt]="altText"
    loading="lazy"
    decoding="async"
  />
  <figcaption class="blog-image-caption">
    {{ altText }}&nbsp;<span class="ai-label">(Image is AI-generated)</span>
  </figcaption>
</figure>
