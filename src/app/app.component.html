<div class="cursor-follower"></div>
<app-navbar></app-navbar>
<router-outlet></router-outlet>
<app-footer></app-footer>

<!-- ── DevTools Security Overlay ── -->
<div class="security-overlay" *ngIf="isLocked$ | async">
  <div class="security-modal position-relative" (click)="$event.stopPropagation()">
    
    <!-- Close Button -->
    <button class="modal-close-btn" (click)="dismissModal()" aria-label="Close modal">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <!-- Icon -->
    <div class="modal-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <!-- Heading -->
    <h2 class="modal-title">Developer Tools Detected!</h2>
    <p class="modal-sub">Enter the authentication key to continue.</p>

    <!-- Key input -->
    <input
      type="password"
      class="modal-input"
      [(ngModel)]="authKey"
      placeholder="Enter access key…"
      (keydown.enter)="attemptUnlock()"
      autocomplete="off"
    />

    <!-- Unlock button -->
    <button class="modal-btn" (click)="attemptUnlock()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Unlock Access
    </button>

    <!-- Error -->
    <p class="modal-error" *ngIf="showError">⚠ Invalid key. Try again.</p>
  </div>
</div>
