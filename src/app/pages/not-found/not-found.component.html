<main class="not-found-wrapper">
  <!-- Interactive Background Elements -->
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  
  <div class="container text-center position-relative" style="z-index: 2;">
    <!-- Large 404 Graphic -->
    <div class="error-graphic">
      <span class="error-number">4</span>
      <div class="error-radar">
        <div class="radar-scan"></div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="radar-icon">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <span class="error-number">4</span>
    </div>

    <!-- Error Messaging -->
    <h1 class="error-title mt-4">Page <span class="text-accent">Not Found</span></h1>
    <p class="error-subtitle text-secondary mx-auto mt-3">
      The content you are looking for has been moved, deleted, or never existed in our database. 
      Let's get you back to scanning and verifying originality.
    </p>

    <!-- Call to Actions -->
    <div class="action-buttons mt-5">
      <a routerLink="/" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Return to Homepage
      </a>
      <a routerLink="/contact" class="btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Contact Support
      </a>
    </div>
  </div>
</main>
